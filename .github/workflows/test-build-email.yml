name: Test — Build Email Preview

on:
  workflow_dispatch:  # manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install matplotlib pillow jinja2

      - name: Build email
        run: python scripts/build_email.py

      - name: Upload email as artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-preview
          path: build/email_*.html
          retention-days: 7
